name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Create dashboard placeholder for embed
        run: mkdir -p web/dashboard/dist && echo '<!doctype html>' > web/dashboard/dist/index.html
      - run: go test ./... -race -count=1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd web/dashboard && npm ci && npm run build
      - run: CGO_ENABLED=0 go build -buildvcs=false -ldflags "-s -w" -o sage-router ./cmd/sage-router
